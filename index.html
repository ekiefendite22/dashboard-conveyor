<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conveyor Dashboard - Data Logger</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #030c1a; margin: 0; font-family: 'Courier New', Courier, monospace; color: #d0e8ff; }
        .card { background: #06152b; border: 1px solid #0e2540; border-radius: 8px; padding: 12px 14px; }
        ::-webkit-scrollbar { width: 6px; background: #030c1a; }
        ::-webkit-scrollbar-thumb { background: #0c2040; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <form id="login-form" class="bg-[#06152b] border border-[#0e2540] p-8 rounded-lg w-[340px] shadow-2xl flex flex-col gap-4">
            <div class="text-center mb-2">
                <div class="inline-flex p-4 bg-[#082040] rounded-full border border-[#0e3060] mb-4">
                    <i class="fa-solid fa-database text-3xl text-[#00d4ff]"></i>
                </div>
                <h2 class="m-0 text-lg text-[#c8e8ff] tracking-widest font-bold">SYSTEM LOGIN</h2>
                <p class="m-0 mt-1 text-xs text-[#3a6080]">Conveyor Real-time Logger</p>
            </div>
            <div>
                <label class="block text-[10px] text-[#7ba0c0] mb-1 font-bold tracking-wider">USER ID</label>
                <input type="text" id="userid" value="admin" class="w-full p-2 bg-[#030d1a] border border-[#0e2540] text-[#00d4ff] rounded outline-none" required autocomplete="off">
            </div>
            <div>
                <label class="block text-[10px] text-[#7ba0c0] mb-1 font-bold tracking-wider">PASSWORD</label>
                <input type="password" id="password" value="admin" class="w-full p-2 bg-[#030d1a] border border-[#0e2540] text-[#00d4ff] rounded outline-none" required>
            </div>
            <button type="submit" class="w-full bg-[#002e52] text-[#00d4ff] border border-[#004a80] rounded py-3 mt-2 font-bold tracking-wider hover:bg-[#003d6a] transition">
                AUTHENTICATE
            </button>
        </form>
    </div>

    <div id="dashboard-page" class="hidden min-h-screen flex-col text-xs">
        
        <div class="bg-[#040f20] border-b border-[#0c1e38] p-3 px-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#082040] rounded-lg flex items-center justify-center border border-[#0e3060]">
                    <i class="fa-solid fa-wave-square text-lg text-[#00d4ff]"></i>
                </div>
                <div>
                    <div class="text-[14px] font-bold text-[#c8e8ff] tracking-wider">CONVEYOR LOGGER SYSTEM</div>
                    <div class="text-[10px] text-[#3a6080] tracking-widest mt-1">ESP32 IoT · Real-time Monitoring Database</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-[11px]">
                    <i id="esp-icon" class="fa-solid fa-wifi text-red-500 opacity-60"></i>
                    <span class="text-[#3a6080]">ESP32</span>
                    <span id="esp-status" class="bg-[#2d0a0a] text-red-500 px-2 py-0.5 rounded text-[9px] font-bold">DISCONNECTED</span>
                </div>
                <button onclick="location.reload()" class="bg-[#2d0a0a] text-red-500 border border-red-500/50 px-3 py-1.5 rounded text-[10px] font-bold hover:bg-red-900/50 transition">LOGOUT</button>
            </div>
        </div>

        <div class="p-4 flex flex-col gap-3">
            <div class="grid grid-cols-4 gap-3">
                <div class="card flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-[#3a6080] tracking-wider mb-1">BELT TENSION</div>
                        <div class="text-2xl font-bold text-[#00d4ff] leading-none"><span id="val-tension">0.0</span><span class="text-xs font-normal text-[#3a6080] ml-1">g</span></div>
                    </div>
                    <i class="fa-solid fa-gauge-high text-2xl text-[#00d4ff] opacity-50"></i>
                </div>
                <div class="card flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-[#3a6080] tracking-wider mb-1">MOTOR SPEED</div>
                        <div class="text-2xl font-bold text-[#a78bfa] leading-none"><span id="val-rpm">0.0</span><span class="text-xs font-normal text-[#3a6080] ml-1">RPM</span></div>
                    </div>
                    <i class="fa-solid fa-rotate-right text-2xl text-[#a78bfa] opacity-50"></i>
                </div>
                <div class="card flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-[#3a6080] tracking-wider mb-1">SLIP RATE</div>
                        <div class="text-2xl font-bold text-[#10b981] leading-none"><span id="val-slip">0.0</span><span class="text-xs font-normal text-[#3a6080] ml-1">%</span></div>
                    </div>
                    <i class="fa-solid fa-arrow-trend-up text-2xl text-[#10b981] opacity-50"></i>
                </div>
                <div class="card flex justify-between items-center">
                    <div>
                        <div class="text-[10px] text-[#3a6080] tracking-wider mb-1">STEPPER POS</div>
                        <div class="text-2xl font-bold text-[#fbbf24] leading-none"><span id="val-step">0</span><span class="text-xs font-normal text-[#3a6080] ml-1">steps</span></div>
                    </div>
                    <i class="fa-solid fa-microchip text-2xl text-[#fbbf24] opacity-50"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-3">
                    <div class="card h-[200px] flex flex-col">
                        <div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-bolt text-[#00d4ff]"></i><span class="text-[11px] text-[#7ba0c0] tracking-wider font-bold">GRAFIK TENSION</span></div>
                        <div class="flex-1 relative"><canvas id="chart-tension"></canvas></div>
                    </div>
                    <div class="card h-[200px] flex flex-col">
                        <div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-chart-line text-[#a78bfa]"></i><span class="text-[11px] text-[#7ba0c0] tracking-wider font-bold">GRAFIK SPEED & SLIP</span></div>
                        <div class="flex-1 relative"><canvas id="chart-speed"></canvas></div>
                    </div>
                </div>

                <div class="card flex flex-col">
                    <div class="flex items-center justify-between mb-3 border-b border-[#0e2540] pb-2">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-list-check text-[#00d4ff]"></i>
                            <span class="text-[11px] text-[#7ba0c0] tracking-wider font-bold">SYSTEM EVENT LOGS</span>
                        </div>
                        <span class="text-[9px] bg-[#0e2540] text-[#7ba0c0] px-2 py-1 rounded">Live Feed</span>
                    </div>
                    <div class="overflow-y-auto max-h-[380px] pr-2">
                        <table class="w-full text-left border-collapse text-[10px]">
                            <thead class="sticky top-0 bg-[#06152b]">
                                <tr class="text-[#3a6080] border-b border-[#0e2540]">
                                    <th class="py-2 px-2 font-normal">TIMESTAMP</th>
                                    <th class="py-2 px-2 font-normal">MODULE</th>
                                    <th class="py-2 px-2 font-normal">EVENT TYPE</th>
                                    <th class="py-2 px-2 font-normal">MESSAGE</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body" class="text-[#c8e8ff] font-mono">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArR-iM7_ugkql7giBvqtrDiepLmhplb1E",
            databaseURL: "https://conveyor-23347-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        Chart.defaults.color = '#7ba0c0';
        Chart.defaults.font.family = "'Courier New', Courier, monospace";
        
        const chartTension = new Chart(document.getElementById('chart-tension'), { type: 'line', data: { labels: [], datasets: [{ borderColor: '#00d4ff', backgroundColor: 'rgba(0, 212, 255, 0.1)', data: [], fill: true, tension: 0.4 }] }, options: { plugins:{legend:{display:false}}, responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false } } } });
        const chartSpeed = new Chart(document.getElementById('chart-speed'), { type: 'line', data: { labels: [], datasets: [{ borderColor: '#a78bfa', data: [], tension: 0.4 }, { borderColor: '#fbbf24', data: [], tension: 0.4 }] }, options: { plugins:{legend:{display:false}}, responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false } } } });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            auth.signInAnonymously().then(() => {
                document.getElementById('login-page').classList.add('hidden');
                const dash = document.getElementById('dashboard-page');
                dash.classList.remove('hidden');
                dash.classList.add('flex');
                mulaiMonitoring();
            });
        });

        function formatTimestamp() {
            const now = new Date();
            return now.getFullYear() + "-" + 
                   String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                   String(now.getDate()).padStart(2, '0') + " " + 
                   String(now.getHours()).padStart(2, '0') + ":" + 
                   String(now.getMinutes()).padStart(2, '0') + ":" + 
                   String(now.getSeconds()).padStart(2, '0');
        }

        function mulaiMonitoring() {
            // 1. Monitoring Sensor (Real-time Value)
            db.ref('eki/conveyor/sensor').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('val-tension').innerText = parseFloat(data.tension || 0).toFixed(1);
                    document.getElementById('val-rpm').innerText = parseFloat(data.rpmMotor || 0).toFixed(1);
                    document.getElementById('val-slip').innerText = parseFloat(data.slip || 0).toFixed(1);
                    document.getElementById('val-step').innerText = data.stepPos || 0;

                    const espStatus = document.getElementById('esp-status');
                    espStatus.innerText = "CONNECTED";
                    espStatus.className = "bg-[#052e1680] text-[#10b981] px-2 py-0.5 rounded text-[9px] font-bold";
                    document.getElementById('esp-icon').className = "fa-solid fa-wifi text-[#10b981]";

                    chartTension.data.labels.push(''); chartTension.data.datasets[0].data.push(data.tension || 0);
                    chartSpeed.data.labels.push(''); chartSpeed.data.datasets[0].data.push(data.rpmMotor || 0); chartSpeed.data.datasets[1].data.push(data.rpmRoller || 0);

                    if (chartTension.data.labels.length > 20) {
                        chartTension.data.labels.shift(); chartTension.data.datasets[0].data.shift();
                        chartSpeed.data.labels.shift(); chartSpeed.data.datasets[0].data.shift(); chartSpeed.data.datasets[1].data.shift();
                    }
                    chartTension.update(); chartSpeed.update();
                }
            });

            // 2. Monitoring Logger (Historical Push)
            const logBody = document.getElementById('log-table-body');
            db.ref('eki/conveyor/logs').limitToLast(15).on('child_added', (snapshot) => {
                const log = snapshot.val();
                if(log) {
                    const row = document.createElement('tr');
                    row.className = "border-b border-[#0e2540]/50 hover:bg-[#082040] transition";
                    
                    // Pewarnaan Badge berdasarkan Tipe
                    let typeColor = "bg-[#1e293b] text-[#94a3b8]"; // Default Info
                    if(log.type === "error") typeColor = "bg-[#3d0000] text-red-400";
                    if(log.type === "success") typeColor = "bg-[#052e16] text-[#10b981]";

                    row.innerHTML = `
                        <td class="py-2 px-2 text-[#7ba0c0]">${formatTimestamp()}</td>
                        <td class="py-2 px-2">${log.role || "SYSTEM"}</td>
                        <td class="py-2 px-2"><span class="px-2 py-0.5 rounded text-[9px] font-bold ${typeColor}">[${log.type.toUpperCase()}]</span></td>
                        <td class="py-2 px-2">${log.message}</td>
                    `;
                    // Prepend supaya yang terbaru ada di paling atas
                    logBody.insertBefore(row, logBody.firstChild);
                }
            });
        }
    </script>
</body>
</html>
