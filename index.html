<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conveyor Dashboard - Standalone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #030c1a; margin: 0; font-family: 'Courier New', Courier, monospace; color: #d0e8ff; }
        .card { background: #06152b; border: 1px solid #0e2540; border-radius: 8px; padding: 12px 14px; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
        ::-webkit-scrollbar { width: 6px; background: #030c1a; }
        ::-webkit-scrollbar-thumb { background: #0c2040; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <form id="login-form" class="bg-[#06152b] border border-[#0e2540] p-8 rounded-lg w-[340px] shadow-2xl flex flex-col gap-4">
            <div class="text-center mb-2">
                <div class="inline-flex p-4 bg-[#082040] rounded-full border border-[#0e3060] mb-4">
                    <i class="fa-solid fa-lock text-3xl text-[#00d4ff]"></i>
                </div>
                <h2 class="m-0 text-lg text-[#c8e8ff] tracking-widest font-bold">SYSTEM LOGIN</h2>
                <p class="m-0 mt-1 text-xs text-[#3a6080]">Conveyor Control & Monitoring</p>
            </div>
            
            <div>
                <label class="block text-[10px] text-[#7ba0c0] mb-1 font-bold tracking-wider">USER ID</label>
                <input type="text" id="userid" value="admin" class="w-full p-2 bg-[#030d1a] border border-[#0e2540] text-[#00d4ff] rounded outline-none" required autocomplete="off">
            </div>
            
            <div>
                <label class="block text-[10px] text-[#7ba0c0] mb-1 font-bold tracking-wider">PASSWORD</label>
                <input type="password" id="password" value="admin" class="w-full p-2 bg-[#030d1a] border border-[#0e2540] text-[#00d4ff] rounded outline-none" required>
            </div>

            <div id="login-error" class="hidden text-red-500 text-[11px] text-center bg-[#2d0a0a] border border-red-500/50 p-2 rounded mt-1">
                ⚠ Login Gagal: Cek Koneksi Internet!
            </div>

            <button type="submit" class="w-full bg-[#002e52] text-[#00d4ff] border border-[#004a80] rounded py-3 mt-2 font-bold tracking-wider hover:bg-[#003d6a] transition">
                AUTHENTICATE
            </button>
        </form>
    </div>

    <div id="dashboard-page" class="hidden min-h-screen flex-col text-xs">
        
        <div class="bg-[#040f20] border-b border-[#0c1e38] p-3 px-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#082040] rounded-lg flex items-center justify-center border border-[#0e3060]">
                    <i class="fa-solid fa-wave-square text-lg text-[#00d4ff]"></i>
                </div>
                <div>
                    <div class="text-[14px] font-bold text-[#c8e8ff] tracking-wider">CONVEYOR BELT TENSION SYSTEM</div>
                    <div class="text-[10px] text-[#3a6080] tracking-widest mt-1">ESP32 IoT · PID Control · Monitoring</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-[11px]">
                    <i id="esp-icon" class="fa-solid fa-wifi text-red-500 opacity-60"></i>
                    <span class="text-[#3a6080]">ESP32</span>
                    <span id="esp-status" class="bg-[#2d0a0a] text-red-500 px-2 py-0.5 rounded text-[9px] font-bold">DISCONNECTED</span>
                </div>
                <button onclick="location.reload()" class="bg-[#2d0a0a] text-red-500 border border-red-500/50 px-3 py-1.5 rounded text-[10px] font-bold hover:bg-red-900/50 transition">LOGOUT</button>
            </div>
        </div>

        <div class="p-4 flex flex-col gap-3">
            <div class="grid grid-cols-4 gap-3">
                <div class="card">
                    <div class="flex justify-between items-center mb-2"><span class="text-[10px] text-[#3a6080] tracking-wider">BELT TENSION</span><i class="fa-solid fa-gauge-high text-[#00d4ff]"></i></div>
                    <div class="text-2xl font-bold text-[#00d4ff] leading-none"><span id="val-tension">0.0</span><span class="text-xs font-normal text-[#3a6080] ml-1">g</span></div>
                </div>
                <div class="card">
                    <div class="flex justify-between items-center mb-2"><span class="text-[10px] text-[#3a6080] tracking-wider">MOTOR SPEED</span><i class="fa-solid fa-rotate-right text-[#a78bfa]"></i></div>
                    <div class="text-2xl font-bold text-[#a78bfa] leading-none"><span id="val-rpm">0.0</span><span class="text-xs font-normal text-[#3a6080] ml-1">RPM</span></div>
                </div>
                <div class="card">
                    <div class="flex justify-between items-center mb-2"><span class="text-[10px] text-[#3a6080] tracking-wider">SLIP RATE</span><i class="fa-solid fa-arrow-trend-up text-[#10b981]"></i></div>
                    <div class="text-2xl font-bold text-[#10b981] leading-none"><span id="val-slip">0.0</span><span class="text-xs font-normal text-[#3a6080] ml-1">%</span></div>
                </div>
                <div class="card">
                    <div class="flex justify-between items-center mb-2"><span class="text-[10px] text-[#3a6080] tracking-wider">STEPPER POS</span><i class="fa-solid fa-microchip text-[#fbbf24]"></i></div>
                    <div class="text-2xl font-bold text-[#fbbf24] leading-none"><span id="val-step">0</span><span class="text-xs font-normal text-[#3a6080] ml-1">steps</span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="card">
                    <div class="flex items-center gap-2 mb-3"><i class="fa-solid fa-bolt text-[#00d4ff]"></i><span class="text-[11px] text-[#7ba0c0] tracking-wider font-bold">GRAFIK TENSION (g)</span></div>
                    <div class="h-[200px] relative"><canvas id="chart-tension"></canvas></div>
                </div>
                <div class="card">
                    <div class="flex items-center gap-2 mb-3"><i class="fa-solid fa-chart-line text-[#a78bfa]"></i><span class="text-[11px] text-[#7ba0c0] tracking-wider font-bold">GRAFIK KECEPATAN & SLIP</span></div>
                    <div class="h-[200px] relative"><canvas id="chart-speed"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Konfigurasi Firebase (Sama persis dengan di ESP32)
        const firebaseConfig = {
            apiKey: "AIzaSyArR-iM7_ugkql7giBvqtrDiepLmhplb1E",
            databaseURL: "https://conveyor-23347-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Variabel UI
        const loginPage = document.getElementById('login-page');
        const dashboardPage = document.getElementById('dashboard-page');
        const espStatus = document.getElementById('esp-status');
        const espIcon = document.getElementById('esp-icon');

        // Setup Chart.js
        Chart.defaults.color = '#7ba0c0';
        Chart.defaults.font.family = "'Courier New', Courier, monospace";
        
        const chartTension = new Chart(document.getElementById('chart-tension'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Tension', borderColor: '#00d4ff', backgroundColor: 'rgba(0, 212, 255, 0.1)', data: [], fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { beginAtZero: false } } }
        });

        const chartSpeed = new Chart(document.getElementById('chart-speed'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Motor RPM', borderColor: '#a78bfa', data: [], tension: 0.4 },
                { label: 'Roller RPM', borderColor: '#fbbf24', data: [], tension: 0.4 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { beginAtZero: true } } }
        });

        let dataPoints = 0;

        // 2. Event Login
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Pake Anonymous Auth supaya selaras sama ESP32 lo
            auth.signInAnonymously()
                .then(() => {
                    loginPage.classList.add('hidden');
                    dashboardPage.classList.remove('hidden');
                    dashboardPage.classList.add('flex');
                    mulaiMonitoring();
                })
                .catch((error) => {
                    document.getElementById('login-error').classList.remove('hidden');
                    console.error("Auth Error:", error);
                });
        });

        // 3. Fungsi Narik Data Firebase
        function mulaiMonitoring() {
            const pathSensor = db.ref('eki/conveyor/sensor');

            pathSensor.on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    // Update Text di Dashboard
                    document.getElementById('val-tension').innerText = parseFloat(data.tension || 0).toFixed(1);
                    document.getElementById('val-rpm').innerText = parseFloat(data.rpmMotor || 0).toFixed(1);
                    document.getElementById('val-slip').innerText = parseFloat(data.slip || 0).toFixed(1);
                    document.getElementById('val-step').innerText = data.stepPos || 0;

                    // Update Indikator Koneksi
                    espStatus.innerText = "CONNECTED";
                    espStatus.classList.replace('text-red-500', 'text-[#10b981]');
                    espStatus.classList.replace('bg-[#2d0a0a]', 'bg-[#052e1680]');
                    espIcon.classList.replace('text-red-500', 'text-[#10b981]');
                    espIcon.classList.replace('opacity-60', 'opacity-100');

                    // Update Data Chart
                    dataPoints++;
                    const timeLabel = dataPoints.toString();
                    
                    chartTension.data.labels.push(timeLabel);
                    chartTension.data.datasets[0].data.push(data.tension || 0);
                    
                    chartSpeed.data.labels.push(timeLabel);
                    chartSpeed.data.datasets[0].data.push(data.rpmMotor || 0);
                    chartSpeed.data.datasets[1].data.push(data.rpmRoller || 0);

                    // Biar grafik gak kepanjangan (maks 20 titik)
                    if (chartTension.data.labels.length > 20) {
                        chartTension.data.labels.shift();
                        chartTension.data.datasets[0].data.shift();
                        chartSpeed.data.labels.shift();
                        chartSpeed.data.datasets[0].data.shift();
                        chartSpeed.data.datasets[1].data.shift();
                    }
                    chartTension.update();
                    chartSpeed.update();
                }
            });
        }
    </script>
</body>
</html>
