<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conveyor Dashboard - Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
    </script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #030c1a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        import {
          LineChart, Line, AreaChart, Area, ComposedChart,
          XAxis, YAxis, CartesianGrid, Tooltip,
          ResponsiveContainer, ReferenceLine
        } from "recharts";
        import {
          Wifi, WifiOff, Activity, AlertTriangle, Zap,
          Power, Database, Settings, Gauge, RotateCw,
          ShieldAlert, CheckCircle2, Clock, TrendingUp, Cpu, Lock, User
        } from "lucide-react";
        
        // --- INISIALISASI FIREBASE ---
        const firebaseConfig = {
  apiKey: "AIzaSyArR-iM7_ugkql7giBvqtrDiepLmhplb1E",
  authDomain: "conveyor-23347.firebaseapp.com",
  databaseURL: "https://conveyor-23347-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "conveyor-23347",
  storageBucket: "conveyor-23347.firebasestorage.app",
  messagingSenderId: "237995882901",
  appId: "1:237995882901:web:fb1a5451274e1a0651de9c",
  measurementId: "G-DGMLVW687S"
};

        if (!window.firebase.apps.length) {
            window.firebase.initializeApp(firebaseConfig);
        }
        const db = window.firebase.database();

        const MAX_PTS = 40;

        function mkInit() {
          const tension = [], speed = [], osc = [];
          for (let i = 0; i < MAX_PTS; i++) {
            tension.push({ t: i, actual: 150, sp: 150 });
            speed.push({ t: i, rpm: 0, slip: 0 });
            osc.push({ t: i, v: 0 });
          }
          return { tension, speed, osc };
        }

        const DarkTip = ({ active, payload }) => {
          if (!active || !payload?.length) return null;
          return (
            <div style={{ background: "#030d1a", border: "1px solid #0f2a50", borderRadius: 6, padding: "6px 10px", fontSize: 11 }}>
              {payload.map((p, i) => (
                <div key={i} style={{ color: p.color, marginBottom: 2 }}>
                  {p.name}: <b>{typeof p.value === "number" ? p.value.toFixed(2) : p.value}</b>
                </div>
              ))}
            </div>
          );
        };

        // ==========================================
        // KOMPONEN HALAMAN LOGIN (Dua Akun Berbeda)
        // ==========================================
        function Login({ onLoginSuccess }) {
          const [userId, setUserId] = useState("");
          const [password, setPassword] = useState("");
          const [error, setError] = useState(false);

          const handleLogin = (e) => {
            e.preventDefault();
            
            // Validasi Akun 1: Admin (Bisa Kontrol)
            if (userId === "admin" && password === "admin123") {
              onLoginSuccess("admin");
            } 
            // Validasi Akun 2: Viewer (Hanya Lihat)
            else if (userId === "viewer" && password === "viewer123") {
              onLoginSuccess("viewer");
            } 
            // Gagal Login
            else {
              setError(true);
            }
          };

          return (
            <div style={{ background: "#030c1a", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#d0e8ff", fontFamily: "'Courier New', Courier, monospace" }}>
              <form onSubmit={handleLogin} style={{ background: "#06152b", border: "1px solid #0e2540", borderRadius: 8, padding: "30px 24px", width: 340, display: "flex", flexDirection: "column", gap: 16, boxShadow: "0 10px 30px rgba(0,0,0,0.5)" }}>
                <div style={{ textAlign: "center", marginBottom: 10 }}>
                  <div style={{ display: "inline-flex", padding: 14, background: "#082040", borderRadius: "50%", border: "1px solid #0e3060", marginBottom: 14 }}>
                    <Lock size={28} color="#00d4ff" />
                  </div>
                  <h2 style={{ margin: 0, fontSize: 16, color: "#c8e8ff", letterSpacing: "0.07em", fontWeight: 700 }}>SYSTEM LOGIN</h2>
                  <p style={{ margin: "6px 0 0", fontSize: 11, color: "#3a6080" }}>Conveyor Control & Monitoring</p>
                </div>
                
                <div>
                  <label style={{ display: "block", fontSize: 10, color: "#7ba0c0", marginBottom: 6, fontWeight: 600, letterSpacing: "0.05em" }}>USER ID</label>
                  <input 
                    type="text" 
                    value={userId} 
                    onChange={e => { setUserId(e.target.value); setError(false); }} 
                    style={{ width: "100%", padding: "10px 12px", background: "#030d1a", border: "1px solid #0e2540", color: "#00d4ff", borderRadius: 6, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} 
                    required 
                    autoComplete="off"
                  />
                </div>
                
                <div>
                  <label style={{ display: "block", fontSize: 10, color: "#7ba0c0", marginBottom: 6, fontWeight: 600, letterSpacing: "0.05em" }}>PASSWORD</label>
                  <input 
                    type="password" 
                    value={password} 
                    onChange={e => { setPassword(e.target.value); setError(false); }} 
                    style={{ width: "100%", padding: "10px 12px", background: "#030d1a", border: "1px solid #0e2540", color: "#00d4ff", borderRadius: 6, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} 
                    required 
                  />
                </div>

                {error && (
                  <div style={{ color: "#ef4444", fontSize: 11, textAlign: "center", background: "#2d0a0a", border: "1px solid #ef444450", padding: "8px", borderRadius: 6 }}>
                    ⚠ Akses Ditolak: ID atau Password salah!
                  </div>
                )}

                <button type="submit" style={{ background: "#002e52", color: "#00d4ff", border: "1px solid #004a80", borderRadius: 6, padding: "12px 0", cursor: "pointer", fontWeight: 700, marginTop: 10, letterSpacing: "0.05em", fontFamily: "inherit" }}>
                  AUTHENTICATE
                </button>
              </form>
            </div>
          );
        }

        // ==========================================
        // KOMPONEN DASHBOARD UTAMA (Menerima Role)
        // ==========================================
        function App({ role, onLogout }) {
          const init = useRef(mkInit()).current;
          const [tensionData, setTensionData] = useState(init.tension);
          const [speedData, setSpeedData] = useState(init.speed);
          const [oscData, setOscData] = useState(init.osc);

          const [espOnline, setEspOnline] = useState(false);
          const [firebaseOnline, setFirebaseOnline] = useState(false);
          const [machineStatus, setMachineStatus] = useState("normal");
          const [stopped, setStopped] = useState(false);

          const [tension, setTension] = useState(0);
          const [rpm, setRpm] = useState(0);
          const [slip, setSlip] = useState(0);
          const [stepPos, setStepPos] = useState(0);

          const [spInput, setSpInput] = useState(150);
          const [activeSP, setActiveSP] = useState(150);

          const [kp, setKp] = useState("1.20");
          const [ki, setKi] = useState("0.08");
          const [kd, setKd] = useState("0.05");
          const [activePID, setActivePID] = useState({ kp: 1.2, ki: 0.08, kd: 0.05 });
          const [pidMsg, setPidMsg] = useState("");

          // Cek apakah user saat ini bertindak sebagai viewer saja
          const isViewer = role === "viewer";

          const [alarms, setAlarms] = useState([]);

          const tickRef = useRef(MAX_PTS);
          const espTimeoutRef = useRef(null);

          function addAlarm(msg, type) {
            const now = new Date();
            const t = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
            setAlarms(prev => [{ time: t, msg, type }, ...prev.slice(0, 9)]);
          }

          function writeLog(type, message) {
            const now = new Date();
            db.ref("eki/conveyor/logs").push({
              timestamp: Date.now(),
              time: now.toLocaleString("id-ID"),
              type,
              role,
              message
            });
          }

          useEffect(() => {
            if (stopped) return;

            const connectedRef = db.ref(".info/connected");
            const connectedCb = connectedRef.on("value", (snap) => {
              if (snap.val() === true) {
                setFirebaseOnline(true);
                addAlarm("Terhubung ke Firebase Realtime Database", "success");
              } else {
                setFirebaseOnline(false);
                setEspOnline(false); 
                addAlarm("Koneksi Firebase terputus", "danger");
              }
            });

            // Sinkronisasi SetPoint dari Database agar Viewer juga tahu SP saat ini berapa
            const spRef = db.ref("eki/conveyor/control/setPoint");
            const spCb = spRef.on("value", (snapshot) => {
              const val = snapshot.val();
              if (val !== null) {
                setActiveSP(val);
                if (isViewer) setSpInput(val); // Update slider viewer mengikuti DB
              }
            });

            // Sinkronisasi status stop agar dashboard viewer juga berubah jika admin menekan emergency stop
            const stopStatusRef = db.ref("eki/conveyor/control/stop");
            const stopStatusCb = stopStatusRef.on("value", (snapshot) => {
              const val = snapshot.val();
              if (val !== null) setStopped(val);
            });

            const logRef = db.ref("eki/conveyor/logs");
            logRef.limitToLast(100).on("value", (snapshot) => {
              const data = snapshot.val();
              if (!data) { setAlarms([]); return; }
              const logs = Object.entries(data)
                .map(([id,value]) => ({id,...value}))
                .sort((a,b)=>b.timestamp-a.timestamp);
              setAlarms(logs);
            });

            const sensorRef = db.ref("eki/conveyor/sensor");
            const sensorCb = sensorRef.on("value", (snapshot) => {
              const data = snapshot.val();
              if (data) {
                if (!espOnline) {
                    setEspOnline(true);
                    addAlarm("ESP32 Online & Mengirim Data", "success");
                }

                clearTimeout(espTimeoutRef.current);
                espTimeoutRef.current = setTimeout(() => {
                  setEspOnline(false);
                  addAlarm("ESP32 Disconnected (Timeout)", "danger");
                }, 6000);

                const t = ++tickRef.current;

                setTension(data.tension || 0);
                setRpm(data.rpm || 0);
                setSlip(data.slip || 0);
                setStepPos(data.stepPos || 0);

                setTensionData(p => [...p.slice(-(MAX_PTS - 1)), { t, actual: data.tension || 0, sp: activeSP }]);
                setSpeedData(p => [...p.slice(-(MAX_PTS - 1)), { t, rpm: data.rpm || 0, slip: data.slip || 0 }]);
                
                const oscVal = +(Math.sin(t) * ((data.rpm || 0) / 400) + (Math.random() - 0.5)).toFixed(2);
                setOscData(p => [...p.slice(-(MAX_PTS - 1)), { t, v: oscVal }]);

                if (data.tension > 188 || data.slip > 5.8) setMachineStatus("danger");
                else if (data.tension > 165 || data.slip > 3.8) setMachineStatus("warning");
                else setMachineStatus("normal");
              }
            });

            return () => {
                connectedRef.off("value", connectedCb);
                spRef.off("value", spCb);
                stopStatusRef.off("value", stopStatusCb);
                sensorRef.off("value", sensorCb);
                clearTimeout(espTimeoutRef.current);
            };
          }, [stopped, activeSP, espOnline, isViewer]);

          function handleApply() {
            if (isViewer) return;
            setActiveSP(spInput);
            db.ref('eki/conveyor/control/setPoint').set(spInput);
            writeLog("INFO", `Set Point diubah menjadi ${spInput} N`);
          }

          function handleUpdatePID() {
            if (isViewer) return;
            const nkp = parseFloat(kp) || 1.2, nki = parseFloat(ki) || 0.08, nkd = parseFloat(kd) || 0.05;
            setActivePID({ kp: nkp, ki: nki, kd: nkd });

            db.ref('eki/conveyor/pid/kp').set(nkp);
            db.ref('eki/conveyor/pid/ki').set(nki);
            db.ref('eki/conveyor/pid/kd').set(nkd);

            writeLog("INFO", `PID Update Kp=${nkp} Ki=${nki} Kd=${nkd}`);

            setPidMsg("✓ Data PID tersimpan di DB");
            setTimeout(() => setPidMsg(""), 3000);
          }

          function handleStop() {
            if (isViewer) return;
            setStopped(true);
            setMachineStatus("danger");
            addAlarm("⚠ EMERGENCY STOP", "danger");
            db.ref('eki/conveyor/control/stop').set(true);
          }

          function handleRestart() {
            if (isViewer) return;
            setStopped(false);
            setMachineStatus("normal");
            addAlarm("Sistem di-restart", "success");
            db.ref('eki/conveyor/control/stop').set(false);
          }

          const sc = {
            normal: { c: "#10b981", bg: "#052e1680", label: "NORMAL OPERATION", Icon: CheckCircle2 },
            warning: { c: "#f59e0b", bg: "#2d1b0080", label: "WARNING", Icon: AlertTriangle },
            danger: { c: "#ef4444", bg: "#2d0a0a80", label: "DANGER", Icon: ShieldAlert },
          }[machineStatus];

          const alarmStyle = { danger: { c: "#ef4444", bg: "#2d0a0a", lbl: "DANGER" }, warning: { c: "#f59e0b", bg: "#2d1b00", lbl: "WARN" }, info: { c: "#38bdf8", bg: "#001a2e", lbl: "INFO" }, success: { c: "#10b981", bg: "#052e16", lbl: "OK" } };

          const card = { background: "#06152b", border: "1px solid #0e2540", borderRadius: 8, padding: "12px 14px" };
          const sectionTitle = { display: "flex", alignItems: "center", gap: 8, marginBottom: 12 };
          const titleTxt = { fontSize: 11, color: "#7ba0c0", letterSpacing: "0.07em", fontWeight: 600 };

          return (
            <div style={{ background: "#030c1a", minHeight: "100vh", color: "#d0e8ff", fontFamily: "'Courier New', Courier, monospace", fontSize: 12 }}>

              <div style={{ background: "#040f20", borderBottom: "1px solid #0c1e38", padding: "10px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 38, height: 38, background: "#082040", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", border: "1px solid #0e3060" }}>
                    <Activity size={18} color="#00d4ff" />
                  </div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#c8e8ff", letterSpacing: "0.07em" }}>CONVEYOR BELT TENSION CONTROL SYSTEM</div>
                    <div style={{ fontSize: 10, color: "#3a6080", letterSpacing: "0.08em", marginTop: 2 }}>ESP32 IoT · PID Control · Real-Time Monitoring Firebase</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  {/* Informasi Role Akun saat ini */}
                  <div style={{ display: "flex", alignItems: "center", gap: 6, background: isViewer ? "#1e293b" : "#1e1b4b", color: isViewer ? "#94a3b8" : "#a5b4fc", padding: "5px 10px", borderRadius: 6, border: `1px solid ${isViewer ? "#334155" : "#4338ca"}` }}>
                    <User size={13} />
                    <span>HAK AKSES: <b>{role.toUpperCase()}</b></span>
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11 }}>
                    {espOnline ? <Wifi size={13} color="#10b981" /> : <WifiOff size={13} color="#ef4444" />}
                    <span style={{ color: "#3a6080" }}>ESP32</span>
                    <span style={{ background: espOnline ? "#052e16" : "#2d0a0a", color: espOnline ? "#10b981" : "#ef4444", padding: "1px 6px", borderRadius: 4, fontSize: 9, fontWeight: 700 }}>{espOnline ? "CONNECTED" : "DISCONNECTED"}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, background: sc.bg, color: sc.c, padding: "5px 12px", borderRadius: 6, border: `1px solid ${sc.c}50`, fontSize: 11, fontWeight: 700 }}>
                    <sc.Icon size={13} />
                    {sc.label}
                  </div>

                  <button onClick={onLogout} style={{ background: "#2d0a0a", color: "#ef4444", border: "1px solid #ef444450", padding: "4px 10px", borderRadius: 5, cursor: "pointer", fontSize: 10, fontWeight: 700 }}>LOGOUT</button>
                </div>
              </div>

              {stopped && (
                <div style={{ background: "#6b0000", borderBottom: "2px solid #ff2020", padding: "9px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, color: "#fff", fontWeight: 700, fontSize: 13 }}>
                    <Power size={16} /> ⚠ EMERGENCY STOP ACTIVE — All actuators halted.
                  </div>
                  {!isViewer && (
                    <button onClick={handleRestart} style={{ background: "#ccdd00", color: "#050000", border: "none", padding: "6px 16px", borderRadius: 6, fontWeight: 800, cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>▶ RESTART SYSTEM</button>
                  )}
                </div>
              )}

              <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 10 }}>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 9 }}>
                  {[
                    { label: "BELT TENSION", value: tension.toFixed(1), unit: "N", Icon: Gauge, c: "#00d4ff", sub: `SP: ${activeSP} N` },
                    { label: "MOTOR SPEED", value: rpm.toLocaleString(), unit: "RPM", Icon: RotateCw, c: "#a78bfa", sub: "Drive Motor (Encoder)" },
                    { label: "SLIP RATE", value: slip.toFixed(1), unit: "%", Icon: TrendingUp, c: slip > 4 ? "#ef4444" : slip > 2.5 ? "#f59e0b" : "#10b981", sub: slip > 4 ? "⚠ CRITICAL" : slip > 2.5 ? "△ WARNING" : "✓ NORMAL" },
                    { label: "STEPPER POSITION", value: stepPos.toLocaleString(), unit: "steps", Icon: Cpu, c: "#fbbf24", sub: "Tensioner Actuator" },
                  ].map((k, i) => (
                    <div key={i} style={{ ...card }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                        <span style={{ fontSize: 10, color: "#3a6080", letterSpacing: "0.07em" }}>{k.label}</span>
                        <k.Icon size={13} color={k.c} />
                      </div>
                      <div style={{ fontSize: 26, fontWeight: 800, color: k.c, lineHeight: 1 }}>
                        {k.value}<span style={{ fontSize: 12, fontWeight: 400, color: "#3a6080", marginLeft: 4 }}>{k.unit}</span>
                      </div>
                      <div style={{ marginTop: 5, fontSize: 10, color: "#4a7090" }}>{k.sub}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9 }}>
                  <div style={{ ...card }}>
                    <div style={sectionTitle}><Zap size={13} color="#00d4ff" /><span style={titleTxt}>BELT TENSION (N) — Load Cell</span></div>
                    <ResponsiveContainer width="100%" height={155}>
                      <LineChart data={tensionData} margin={{ top: 4, right: 6, left: -22, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#091a30" />
                        <XAxis dataKey="t" hide />
                        <YAxis domain={["auto", "auto"]} tick={{ fontSize: 9, fill: "#3a6080" }} />
                        <Tooltip content={<DarkTip />} />
                        <Line type="monotone" dataKey="actual" stroke="#00d4ff" dot={false} strokeWidth={2} name="Actual (N)" isAnimationActive={false} />
                        <Line type="monotone" dataKey="sp" stroke="#f59e0b" dot={false} strokeWidth={1.5} strokeDasharray="5 3" name="Set Point (N)" isAnimationActive={false} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>

                  <div style={{ ...card }}>
                    <div style={sectionTitle}><Activity size={13} color="#a78bfa" /><span style={titleTxt}>SPEED & SLIP — Rotary Encoder</span></div>
                    <ResponsiveContainer width="100%" height={155}>
                      <ComposedChart data={speedData} margin={{ top: 4, right: 6, left: -22, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#091a30" />
                        <XAxis dataKey="t" hide />
                        <YAxis yAxisId="l" domain={["auto", "auto"]} tick={{ fontSize: 9, fill: "#3a6080" }} />
                        <YAxis yAxisId="r" orientation="right" domain={[0, 10]} tick={{ fontSize: 9, fill: "#3a6080" }} />
                        <Tooltip content={<DarkTip />} />
                        <Area yAxisId="l" type="monotone" dataKey="rpm" stroke="#a78bfa" fill="#2d1b5518" strokeWidth={2} name="RPM" isAnimationActive={false} />
                        <Line yAxisId="r" type="monotone" dataKey="slip" stroke="#f87171" dot={false} strokeWidth={2} name="Slip %" isAnimationActive={false} />
                      </ComposedChart>
                    </ResponsiveContainer>
                  </div>

                  <div style={{ ...card }}>
                    <div style={sectionTitle}><Activity size={13} color="#10b981" /><span style={titleTxt}>MECHANICAL OSCILLATION / RESONANCE</span></div>
                    <ResponsiveContainer width="100%" height={155}>
                      <AreaChart data={oscData} margin={{ top: 4, right: 6, left: -22, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#091a30" />
                        <XAxis dataKey="t" hide />
                        <YAxis domain={[-8, 8]} tick={{ fontSize: 9, fill: "#3a6080" }} />
                        <Tooltip content={<DarkTip />} />
                        <ReferenceLine y={0} stroke="#122a40" />
                        <Area type="monotone" dataKey="v" stroke="#10b981" fill="#052e1635" strokeWidth={1.5} name="Oscillation" isAnimationActive={false} />
                      </AreaChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9 }}>
                  
                  {/* PANEL KONTROL UTAMA */}
                  <div style={{ ...card, opacity: isViewer ? 0.6 : 1 }}>
                    <div style={sectionTitle}>
                      <Gauge size={13} color="#00d4ff" />
                      <span style={titleTxt}>MAIN CONTROL PANEL {isViewer && "(READ-ONLY)"}</span>
                      <span style={{ marginLeft: "auto", fontSize: 9, color: "#3a6080", background: "#050f1e", padding: "2px 8px", borderRadius: 4 }}>Active SP: {activeSP} N</span>
                    </div>

                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 10, color: "#3a6080", letterSpacing: "0.06em", marginBottom: 7 }}>TENSION SET POINT (N)</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <input type="range" min={80} max={220} step={1} value={spInput} onChange={e => setSpInput(+e.target.value)} disabled={stopped || isViewer} style={{ flex: 1, accentColor: "#00d4ff", cursor: isViewer ? "not-allowed" : "pointer" }} />
                        <div style={{ minWidth: 68, textAlign: "center", background: "#030d1a", border: "1px solid #0f2a50", borderRadius: 6, padding: "5px 8px", color: "#00d4ff", fontWeight: 800, fontSize: 17 }}>
                          {spInput}<span style={{ fontSize: 10, fontWeight: 400, marginLeft: 2 }}>N</span>
                        </div>
                      </div>
                    </div>

                    <button onClick={handleApply} disabled={stopped || isViewer} style={{ width: "100%", background: (stopped || isViewer) ? "#0a1a2e" : "#002e52", color: (stopped || isViewer) ? "#264a70" : "#00d4ff", border: `1px solid ${(stopped || isViewer) ? "#0a1a2e" : "#004a80"}`, borderRadius: 6, padding: "9px 0", fontFamily: "inherit", fontSize: 12, fontWeight: 700, cursor: (stopped || isViewer) ? "not-allowed" : "pointer", letterSpacing: "0.06em", marginBottom: 10 }}>
                      {isViewer ? "🔒 VIEWERS CANNOT ALTER SETPOINT" : "▶ APPLY SET POINT TO DB"}
                    </button>

                    <button onClick={stopped ? handleRestart : handleStop} disabled={isViewer} style={{ width: "100%", background: isViewer ? "#111" : stopped ? "#0a2e00" : "#3d0000", color: isViewer ? "#444" : stopped ? "#4ade80" : "#ff2222", border: `2px solid ${isViewer ? "#222" : stopped ? "#22c55e" : "#cc0000"}`, borderRadius: 8, padding: "13px 0", fontFamily: "inherit", fontSize: 13, fontWeight: 800, cursor: isViewer ? "not-allowed" : "pointer", letterSpacing: "0.07em", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      <Power size={16} />
                      {isViewer ? "🔒 CONTROL DISABLED" : stopped ? "▶ RESTART SYSTEM" : "■ EMERGENCY STOP"}
                    </button>
                  </div>

                  {/* PANEL PID TUNING */}
                  <div style={{ ...card, opacity: isViewer ? 0.6 : 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <Settings size={13} color="#a78bfa" />
                        <span style={titleTxt}>PID CONTROLLER TUNING {isViewer && "(READ-ONLY)"}</span>
                      </div>
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9, marginBottom: 12 }}>
                      {[
                        { lbl: "Kp", sub: "Proportional", val: kp, set: setKp, c: "#00d4ff" },
                        { lbl: "Ki", sub: "Integral", val: ki, set: setKi, c: "#a78bfa" },
                        { lbl: "Kd", sub: "Derivative", val: kd, set: setKd, c: "#10b981" },
                      ].map(p => (
                        <div key={p.lbl}>
                          <div style={{ marginBottom: 5 }}>
                            <span style={{ color: p.c, fontWeight: 700, fontSize: 13 }}>{p.lbl}</span>
                          </div>
                          <input type="number" step="0.01" min="0" value={p.val} onChange={e => p.set(e.target.value)} disabled={stopped || isViewer}
                            style={{ width: "100%", background: "#030d1a", border: `1px solid ${p.c}35`, color: p.c, borderRadius: 6, padding: "7px 8px", fontFamily: "inherit", fontSize: 15, fontWeight: 800, boxSizing: "border-box", outline: "none", cursor: isViewer ? "not-allowed" : "text" }} />
                        </div>
                      ))}
                    </div>

                    <button onClick={handleUpdatePID} disabled={stopped || isViewer} style={{ width: "100%", background: (stopped || isViewer) ? "#0a1220" : "#12003a", color: (stopped || isViewer) ? "#264a70" : "#a78bfa", border: `1px solid ${(stopped || isViewer) ? "#0a1220" : "#4a1a90"}`, borderRadius: 6, padding: "9px 0", fontFamily: "inherit", fontSize: 12, fontWeight: 700, cursor: (stopped || isViewer) ? "not-allowed" : "pointer", letterSpacing: "0.06em" }}>
                      {isViewer ? "🔒 VIEWERS CANNOT ALTER PID" : "⬆ SEND PID PARAMS TO DB"}
                    </button>

                    {pidMsg && <div style={{ marginTop: 8, color: "#10b981", fontSize: 11, display: "flex", alignItems: "center", gap: 6 }}><CheckCircle2 size={12} /> {pidMsg}</div>}
                  </div>
                </div>

                {/* LOGS */}
                <div style={{ ...card }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}><Clock size={13} color="#f59e0b" /><span style={titleTxt}>SYSTEM LOG & ALARM EVENTS</span></div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                    <thead>
                      <tr style={{ borderBottom: "1px solid #0c2040" }}>
                        {["TIME", "STATUS", "EVENT MESSAGE"].map(h => (
                          <th key={h} style={{ textAlign: "left", padding: "3px 10px", color: "#264a70", fontSize: 9, letterSpacing: "0.06em", fontWeight: 600 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {alarms.slice(0, 8).map((a, i) => {
                        const s =
  alarmStyle[(a.type || "").toLowerCase()] ||
  alarmStyle.info;
                        return (
                          <tr key={i} style={{ borderBottom: "1px solid #070f1e", background: i === 0 ? "#070f20" : "transparent" }}>
                            <td style={{ padding: "5px 10px", color: "#3a6080", fontFamily: "monospace", whiteSpace: "nowrap" }}>{a.time || new Date(a.timestamp).toLocaleString("id-ID")}</td>
                            <td style={{ padding: "5px 10px" }}><span style={{ color: s.c, background: s.bg, padding: "2px 7px", borderRadius: 4, fontSize: 9, fontWeight: 700 }}>● {s.lbl}</span></td>
                            <td style={{ padding: "5px 10px", color: i === 0 ? "#b0d0f0" : "#4a7090" }}>
  [{(a.role || "SYSTEM").toUpperCase()}] {a.message || a.msg}
</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

              </div>

              <style>{`
                @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
                input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
                ::-webkit-scrollbar { width: 6px; background: #030c1a; }
                ::-webkit-scrollbar-thumb { background: #0c2040; border-radius: 3px; }
              `}</style>
            </div>
          );
        }

        // ==========================================
        // MAIN ROUTER (Pengatur Autentikasi & Role)
        // ==========================================
        function Main() {
          const [auth, setAuth] = useState({ isAuthenticated: false, role: "" });

          if (!auth.isAuthenticated) {
            return (
              <Login onLoginSuccess={(userRole) => setAuth({ isAuthenticated: true, role: userRole })} />
            );
          }

          return (
            <App 
              role={auth.role} 
              onLogout={() => setAuth({ isAuthenticated: false, role: "" })} 
            />
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
